name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build plugin
      run: npm run build
    
    - name: Create release package
      run: |
        mkdir -p release/obsidian-cat-pet
        cp main.js release/obsidian-cat-pet/
        cp manifest.json release/obsidian-cat-pet/
        cp styles.css release/obsidian-cat-pet/
        cp -r assets release/obsidian-cat-pet/
        cd release && zip -r obsidian-cat-pet.zip obsidian-cat-pet/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./release/obsidian-cat-pet.zip
        name: Release ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
