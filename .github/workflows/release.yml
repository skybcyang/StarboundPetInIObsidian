name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build plugin
      run: npm run build
    
    - name: Create release package
      run: |
        mkdir -p release/obsidian-cat-pet
        cp dist/main.js release/obsidian-cat-pet/
        cp dist/manifest.json release/obsidian-cat-pet/
        cp dist/styles.css release/obsidian-cat-pet/
        cp -r assets release/obsidian-cat-pet/
        cd release && zip -r obsidian-cat-pet.zip obsidian-cat-pet/
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release/obsidian-cat-pet.zip
        asset_name: obsidian-cat-pet.zip
        asset_content_type: application/zip
